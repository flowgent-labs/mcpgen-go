# Dex OIDC provider configuration for mcpfather integration tests.
# Provides an OIDC issuer with password grant support (mockPassword connector)
# so that generated MCP servers can authenticate to upstream APIs via OIDC tokens.
issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  grantTypes: ["authorization_code", "refresh_token", "password"]
  responseTypes: ["code"]
  skipApprovalScreen: true

staticClients:
- id: mcpfather-client
  secret: mcpfather-secret
  name: MCPFather
  redirectURIs:
  - http://localhost:8080/auth/callback/oidc
  - http://127.0.0.1:8080/auth/callback/oidc

connectors:
- type: mockPassword
  id: mock
  name: Mock
  config:
    username: "mcpfather-client"
    password: "mcpfather-secret"
