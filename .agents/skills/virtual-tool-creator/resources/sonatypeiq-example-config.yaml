# ---- Native MCP Tools ----
tools:
  expose:
    # When true, all native tools are registered by default
    # (individual tools can be hidden via excludes).
    # When false (the default), only tools listed in includes
    # are exposed.
    register-all-tools-by-default: false

    # Explicitly expose these tools (operationId values).
    # Takes precedence: tools listed here are always exposed,
    # even if register-all-tools-by-default is false.
    includes: []

    # Explicitly hide these tools from external agents (operationId values).
    # Takes precedence over register-all-tools-by-default.
    # A tool listed in BOTH includes and excludes will cause
    # the server to fail at startup.
    excludes: []

# ---- Upstream Request Forwarding ----
upstream:
  # When true, the MCP session ID from client requests is forwarded
  # to upstream APIs as the X-MCP-Session-ID HTTP header.
  # (DEPRECATED: session ID is always forwarded as X-MCP-Session-ID)
  enable_mcp_session_in_forwarding: false

# ---- Management Endpoints (metrics, tracing, pprof) ----
mgmt:
  # When true, enables the management HTTP server (/metrics, /health).
  # Default: true (management server starts unless explicitly disabled).
  enabled: true
  host: 0.0.0.0
  port: 9991
  pprof:
    enabled: false
    server_bind: 0.0.0.0:6669
  otel:
    enabled: false
    endpoint: localhost:4317
    protocol: grpc             # grpc | http/protobuf | http/json
    timeout: 10000             # connection timeout in milliseconds
    sample_rate: 1.0           # 0.0–1.0 trace sampling ratio
  metrics:
    # When true, enables Prometheus metrics export (/metrics endpoint).
    # Default: true (metrics enabled unless explicitly disabled).
    enabled: true
    prometheus: true
    export_interval: 30s
    histogram_boundaries:
      task: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30, 60, 120]
    labels: {}                 # static labels added to every metric

# ---- Virtual Tools ----
# Compose multiple native tools into a single virtual tool via a declarative
# e.g: 5-step pipeline (call → jq → foreach → emit → return).
# Schema: https://github.com/wl4g-ai/mcpgen-go/blob/main/.agents/skills/virtual-tool-creator/resources/dsl-schema.json
virtualTools:
  - name: get_scan_violations_recommends
    enabled: true
    description: >
      Retrieve policy violations for a scan, keep components at or above a
      threat threshold, enrich each component with remediation suggestions.
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
    inputSchema:
      type: object
      required:
        - applicationPublicId
        - scanId

      properties:
        applicationPublicId:
          type: string
          default: 12609073_rengine
          description: Sonatype IQ application public id.

        scanId:
          type: string
          default: b3a29500a885473ca6b4b5c759c39bf2
          description: Report id / scan id to inspect.

        minThreatLevel:
          type: integer
          default: 5
          minimum: 0
          maximum: 10
          description: Minimum policy threat level used to keep violations and components.

        includeViolationTimes:
          type: boolean
          default: true
          description: Include policy violation times in the policy report request.

        historyLimit:
          type: integer
          default: 100
          minimum: 1
          maximum: 100
          description: Number of recent application reports used to resolve the scan stage.

        includeParentRemediation:
          type: boolean
          default: true
          description: Include parent remediation suggestions for transitive dependencies.

        remediationConcurrency:
          type: integer
          default: 4
          minimum: 1
          maximum: 16
          description: Maximum remediation lookups to run concurrently.
    pipeline:
      - id: policy
        kind: call
        spec:
          tool: GetPolicyViolations1
          parse: json
          args:
            applicationPublicId: $input.applicationPublicId
            scanId: $input.scanId
            includeViolationTimes: $input.includeViolationTimes
      - id: appInternal
        kind: jq
        spec:
          from: $policy
          expr: .application.id
        require:
          nonEmpty: true
          message: Cannot find internal application id in policy response.
      - id: history
        kind: call
        spec:
          tool: GetReportHistoryForApplication
          parse: json
          args:
            applicationId: $appInternal
            limit: $input.historyLimit
      - id: stage
        kind: jq
        spec:
          from: $history
          vars:
            scanId: $input.scanId
          expr: |
            ([.reports[]
              | select(.scanId == $scanId)
              | .stage][0] // null)
        require:
          nonEmpty: true
          message: Cannot find stage for scanId=$input.scanId.
      - id: threatComponents
        kind: jq
        spec:
          from: $policy
          vars:
            minThreatLevel: $input.minThreatLevel
          expr: |
            [
              .components[]?
              | select(
                  (.violations // [])
                  | any(.policyThreatLevel >= $minThreatLevel)
                )
              | {
                  displayName,
                  packageUrl,
                  hash,
                  sha256,
                  componentIdentifier,

                  maxThreatLevel:
                    ([.violations[]?.policyThreatLevel] | max),

                  active:
                    any(
                      .violations[];
                      .policyThreatLevel >= $minThreatLevel
                      and (.waived != true)
                    ),

                  violations:
                    [
                      .violations[]?
                      | select(.policyThreatLevel >= $minThreatLevel)
                      | {
                          policyViolationId,
                          policyName,
                          policyThreatLevel,
                          policyThreatCategory,
                          waived,

                          constraints:
                            [
                              .constraints[]?
                              | {
                                  constraintName,
                                  conditions:
                                    [
                                      .conditions[]?.conditionReason
                                    ]
                                }
                            ]
                        }
                    ],

                  remediationRequest:
                    {
                      packageUrl,
                      hash,
                      sha256,
                      componentIdentifier,
                      displayName,
                      proprietary,
                      thirdParty,
                      originalPurl
                    }
                }
            ]
      - id: components
        kind: foreach
        spec:
          in: $threatComponents
          as: component
          concurrency: $input.remediationConcurrency
          preserveOrder: true

          pipeline:

            - id: remediation
              kind: call
              spec:
                tool: GetSuggestedRemediationForComponent
                parse: json
                args:
                  ownerType: application
                  ownerId: $appInternal
                  stageId: $stage
                  scanId: $input.scanId
                  includeParentRemediation: $input.includeParentRemediation
                  body: $component.remediationRequest

            - id: enrichedComponent
              kind: emit
              spec:
                from: $component
                vars:
                  remediation: $remediation
                expr: |
                  (. | del(.remediationRequest))
                  +
                  {
                    remediation:
                      [
                        ($remediation.remediation.versionChanges // [])[]
                        | {
                            type,
                            recommendedDisplayName:
                              .data.component.displayName,
                            recommendedPackageUrl:
                              .data.component.packageUrl,
                            recommendedVersion:
                              .data.component.componentIdentifier.coordinates.version
                          }
                      ]
                  }
      - id: report
        kind: return
        spec:
          from: $components
          vars:
            appPublic: $input.applicationPublicId
            appInternal: $appInternal
            scanId: $input.scanId
            stage: $stage
          expr: |
            {
              application: {
                publicId: $appPublic,
                internalId: $appInternal
              },

              scan: {
                scanId: $scanId,
                stage: $stage
              },

              summary: {
                threatComponentCount: length,
                activeThreatComponentCount:
                  ([ .[]
                     | select(.active == true)
                   ] | length)
              },

              components: .
            }