{{- if (include "__BINARY_NAME__.useStaticSecret" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "__BINARY_NAME__.fullname" . }}-secret
  labels:
    {{- include "__BINARY_NAME__.labels" . | nindent 4 }}
  {{- with .Values.secret.static.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  oidc_client_secret: {{ .Values.secret.static.oidcClientSecret | quote }}
  bearer_token: {{ .Values.secret.static.bearerToken | quote }}
  cookie_token: {{ .Values.secret.static.cookieToken | quote }}
{{- end }}
