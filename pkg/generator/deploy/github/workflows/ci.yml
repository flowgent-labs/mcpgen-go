# Generated by https://github.com/flowgent-labs/mcpfather

name: Build & Test

on:
  pull_request:
  schedule:
    # Daily build on main branch (03:07 UTC)
    - cron: "7 3 * * *"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Unit Tests
        run: make test
