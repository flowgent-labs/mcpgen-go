# Generated by https://github.com/flowgent-labs/mcpfather

name: Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    # Daily build on main branch (03:07 UTC)
    - cron: "7 3 * * *"

jobs:
  build-and-test:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Merge pull request #')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Unit Tests
        run: make test
