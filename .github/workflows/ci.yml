name: Build & Test

on:
  push:
    branches-ignore: [main]
  pull_request:
  schedule:
    # Daily build on main branch (03:07 UTC)
    - cron: "7 3 * * *"
    # Weekly full integration test on main branch (Monday 08:37 UTC)
    - cron: "37 8 * * 1"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Unit Tests
        run: make test-unit

  integration-core-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Run Core E2E Integration Tests
        run: go test -v -count=1 -timeout 300s -run "E2E_Core|TestGenerator_|TestAuth_|TestLogging_|TestDownload_|TestCLI_|TestCyclicRef_|TestRegression_|TestConfig_" ./it/...

  integration-virtual-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Run Virtual Tools Integration Tests
        run: go test -v -count=1 -timeout 300s -run "E2E_VirtualTool|E2E_MCP_HeaderForwarding|TestScenario_|E2E_SonatypeIQ" ./it/...

  integration-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Keycloak OIDC Provider
        run: |
          docker run -d --name mcpfather-keycloak \
            --network host \
            --hostname 127.0.0.1 \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
            registry.cn-shenzhen.aliyuncs.com/wl4g/keycloak:26.7.0 \
            start-dev --hostname=127.0.0.1 --hostname-strict=false

      - name: Wait for Keycloak
        timeout-minutes: 2
        run: |
          for i in $(seq 1 60); do
            if wget -qO- http://127.0.0.1:8080/realms/master/.well-known/openid-configuration 2>/dev/null; then
              echo "Keycloak is ready"
              exit 0
            fi
            echo "Waiting for Keycloak... ($i/60)"
            sleep 2
          done
          echo "Keycloak failed to start"
          docker logs mcpfather-keycloak
          exit 1

      - name: Build
        run: make build

      - name: Run OIDC Integration Tests
        run: go test -v -count=1 -timeout 300s -run "OIDC" ./it/...

      - name: Collect Keycloak Logs (on failure)
        if: failure()
        run: docker logs mcpfather-keycloak

  integration-ldap:
    runs-on: ubuntu-latest
    env:
      GLAUTH_URL: "ldap://localhost:3893"
      GLAUTH_BIND_DN: "cn=mcp-svc,ou=svcaccts,dc=test,dc=local"
      GLAUTH_BIND_PASSWORD: "ldap-secret-123"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Glauth LDAP Server
        run: |
          docker run -d --name mcpfather-glauth \
            --network host \
            -v ${{ github.workspace }}/it/docker/glauth/config.toml:/app/config/config.cfg:ro \
            registry.cn-shenzhen.aliyuncs.com/wl4g/glauth:v2.5.0

      - name: Wait for Glauth
        timeout-minutes: 1
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 3893 2>/dev/null; then
              echo "Glauth LDAP server is ready"
              exit 0
            fi
            echo "Waiting for Glauth... ($i/30)"
            sleep 2
          done
          echo "Glauth failed to start"
          docker logs mcpfather-glauth
          exit 1

      - name: Build
        run: make build

      - name: Run LDAP Integration Tests
        run: go test -v -count=1 -timeout 300s -run "LDAP" ./it/...

      - name: Collect Glauth Logs (on failure)
        if: failure()
        run: docker logs mcpfather-glauth
