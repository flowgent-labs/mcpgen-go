name: Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly full integration test on main branch (Monday 08:37 UTC)
    - cron: "37 8 * * 1"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Debug Go Env
        run: |
          set -x
          go version
          go env GOPATH GOROOT GOMOD GOCACHE
          echo "=== Makefile test-unit recipe ==="
          sed -n '28,29p' Makefile
          echo "=== go list ./pkg/... ==="
          go list ./pkg/...
          echo "=== go list ./cmd/... ==="
          go list ./cmd/...

      - name: Build
        run: |
          set -x
          make build

      - name: Unit Tests
        run: |
          set -x
          go test -v -count=1 -timeout 300s ./pkg/... ./cmd/...

  integration-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Dex OIDC Provider
        run: |
          docker run -d --name mcpfather-dex \
            --network host \
            -v ${{ github.workspace }}/it/docker/dex/config.yaml:/etc/dex/config.yaml:ro \
            registry.cn-shenzhen.aliyuncs.com/wl4g/dex:v2.41.1 \
            dex serve /etc/dex/config.yaml

      - name: Wait for Dex
        timeout-minutes: 1
        run: |
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:5556/dex/.well-known/openid-configuration 2>/dev/null; then
              echo "Dex is ready"
              exit 0
            fi
            echo "Waiting for Dex... ($i/30)"
            sleep 2
          done
          echo "Dex failed to start"
          docker logs mcpfather-dex
          exit 1

      - name: Verify OIDC Discovery
        run: |
          echo "=== OIDC Discovery Document ==="
          curl -sSf http://localhost:5556/dex/.well-known/openid-configuration | python3 -m json.tool

      - name: Build
        run: make build

      - name: Run OIDC Integration Tests
        run: go test -v -count=1 -timeout 300s -run "OIDC" ./it/...

      - name: Collect Dex Logs (on failure)
        if: failure()
        run: docker logs mcpfather-dex

  integration-ldap:
    runs-on: ubuntu-latest
    env:
      GLAUTH_URL: "ldap://localhost:3893"
      GLAUTH_BIND_DN: "cn=mcp-svc,ou=svcaccts,dc=test,dc=local"
      GLAUTH_BIND_PASSWORD: "ldap-secret-123"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Glauth LDAP Server
        run: |
          docker run -d --name mcpfather-glauth \
            --network host \
            -v ${{ github.workspace }}/it/docker/glauth/config.toml:/app/config/config.cfg:ro \
            registry.cn-shenzhen.aliyuncs.com/wl4g/glauth:v2.5.0

      - name: Wait for Glauth
        timeout-minutes: 1
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 3893 2>/dev/null; then
              echo "Glauth LDAP server is ready"
              exit 0
            fi
            echo "Waiting for Glauth... ($i/30)"
            sleep 2
          done
          echo "Glauth failed to start"
          docker logs mcpfather-glauth
          exit 1

      - name: Build
        run: make build

      - name: Run LDAP Integration Tests
        run: go test -v -count=1 -timeout 300s -run "LDAP" ./it/...

      - name: Collect Glauth Logs (on failure)
        if: failure()
        run: docker logs mcpfather-glauth

  integration-virtual-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Run Virtual Tools Integration Tests
        run: go test -v -count=1 -timeout 300s -run "E2E_VirtualTool|E2E_MCP_HeaderForwarding|TestScenario_|E2E_SonatypeIQ" ./it/...

  integration-core-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Run Core E2E Integration Tests
        run: go test -v -count=1 -timeout 300s -run "E2E_Core|TestGenerator_|TestAuth_|TestLogging_|TestDownload_|TestCLI_|TestCyclicRef_|TestRegression_|TestConfig_" ./it/...
