apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sonarqube-mcp.fullname" . }}-config
  labels:
    {{- include "sonarqube-mcp.labels" . | nindent 4 }}
data:
  config.yaml: |
    # MCP server configuration — generated by mcpfather
    upstream:
      endpoint: {{ .Values.config.upstream.endpoint | quote }}
      enable_mcp_session_in_forwarding: {{ .Values.config.upstream.enableMCPSessionInForwarding }}

    auth:
      oidc:
        enabled: {{ .Values.config.auth.oidc.enabled }}
        issuer: {{ .Values.config.auth.oidc.issuer | quote }}
        client_id: {{ .Values.config.auth.oidc.clientId | quote }}
        scopes: {{ .Values.config.auth.oidc.scopes | quote }}
        token_url: {{ .Values.config.auth.oidc.tokenUrl | quote }}
        client_secret: ""   # set via MCP__AUTH__OIDC__CLIENT_SECRET env (from Secret)

      ldap:
        enabled: {{ .Values.config.auth.ldap.enabled }}
        url: {{ .Values.config.auth.ldap.url | quote }}
        base_dn: {{ .Values.config.auth.ldap.baseDN | quote }}
        bind_dn: {{ .Values.config.auth.ldap.bindDN | quote }}
        bind_password: ""   # set via MCP__AUTH__LDAP__BIND_PASSWORD env (from Secret)
        insecure_skip_verify: {{ .Values.config.auth.ldap.insecureSkipVerify }}
        timeout: {{ .Values.config.auth.ldap.timeout }}

      static:
        bearer_token: ""    # set via MCP__AUTH__STATIC__BEARER_TOKEN env (from Secret)
        cookie_token: ""    # set via MCP__AUTH__STATIC__COOKIE_TOKEN env (from Secret)

    tools:
      expose:
        register_all_tools_by_default: {{ .Values.config.tools.registerAllByDefault }}
        includes:
          {{- range .Values.config.tools.includes }}
          - {{ . | quote }}
          {{- end }}
        excludes:
          {{- range .Values.config.tools.excludes }}
          - {{ . | quote }}
          {{- end }}

    mgmt:
      enabled: {{ .Values.config.mgmt.enabled }}
      host: "0.0.0.0"
      port: {{ .Values.service.mgmtPort }}
      otel:
        enabled: {{ .Values.config.mgmt.otel.enabled }}
        endpoint: {{ .Values.config.mgmt.otel.endpoint | quote }}
        protocol: {{ .Values.config.mgmt.otel.protocol | quote }}
        timeout: 10000
        sample_rate: {{ .Values.config.mgmt.otel.sampleRate }}
      metrics:
        enabled: {{ .Values.config.mgmt.metrics.enabled }}
        prometheus: {{ .Values.config.mgmt.metrics.prometheus }}
        export_interval: "30s"

    runtime:
      log_authorization: {{ .Values.config.runtime.logAuthorization }}
      download_dir: {{ .Values.config.runtime.downloadDir | default "" | quote }}

    virtualTools:
        {{- toYaml .Values.config.virtualTools | nindent 6 }}
